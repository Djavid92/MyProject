spring:
  application:
    name:
      ApplicationIncomeExpense
  web:
    resources:
      static-locations: classpath:/static/
    mvc:
      static-path-pattern: /**
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: djavid
    password: djavid
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  server:
    servlet:
      context-path: /
  data:
    redis:
      host: localhost
      port: 6379
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
  prometheus:
    metrics:
      export:
        enabled: true