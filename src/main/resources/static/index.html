<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый Дашборд - Обзор</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="header-nav navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand text-white" href="/">📊 Учет Финансов</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" aria-current="page" href="/">Обзор (Текущий месяц)</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Операции / Добавление</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/previous">Предыдущий месяц</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Обзор за Текущий Месяц</h2>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card income-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-success">💰 Общий Доход</h5>
                    <p class="total-value income-text" id="totalIncome">0 ₽</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card expense-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-danger">💸 Общий Расход</h5>
                    <p class="total-value expense-text" id="totalExpense">0 ₽</p>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-4">
            <div class="card balance-card p-3">
                <div class="card-body">
                    <h5 class="card-title text-warning">📈 Баланс (Итог)</h5>
                    <p class="total-value" id="currentBalance">0 ₽</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
