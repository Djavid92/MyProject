<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовый дашборд</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>💰 Финансовый дашборд</h1>
    </header>

    <!-- Статистика -->
    <section class="stats-section">
        <div class="stats-grid">
            <div class="stat-card income-card">
                <h3>Общий доход</h3>
                <p id="total-income">0 ₽</p>
            </div>
            <div class="stat-card expense-card">
                <h3>Общий расход</h3>
                <p id="total-expense">0 ₽</p>
            </div>
            <div class="stat-card balance-card">
                <h3>Баланс</h3>
                <p id="balance">0 ₽</p>
            </div>
        </div>
    </section>

    <!-- График -->
    <section class="chart-section">
        <canvas id="financeChart"></canvas>
    </section>

    <!-- Кнопки действий -->
    <section class="actions-section">
        <button class="btn btn-primary" onclick="showAddForm('income')">
            ➕ Добавить доход
        </button>
        <button class="btn btn-secondary" onclick="showAddForm('expense')">
            ➕ Добавить расход
        </button>
        <button class="btn btn-info" onclick="loadDetailedView()">
            📊 Детальная статистика
        </button>
        <button class="btn btn-danger" onclick="deleteAllData()">
            🗑️ Удалить все
        </button>
    </section>

    <!-- Списки последних операций -->
    <section class="recent-section">
        <div class="recent-grid">
            <div class="recent-card">
                <h3>Последние доходы</h3>
                <ul id="recent-incomes"></ul>
            </div>
            <div class="recent-card">
                <h3>Последние расходы</h3>
                <ul id="recent-expenses"></ul>
            </div>
        </div>
    </section>
</div>

<!-- Модальное окно для добавления -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="hideModal()">&times;</span>
        <h3 id="modal-title">Добавить операцию</h3>
        <form id="finance-form" onsubmit="submitForm(event)">

            <!-- УБРАН тип операции -->
            <input type="hidden" id="type" value="income">

            <div class="form-group">
                <label for="category">Категория:</label>
                <input type="text" id="category" maxlength="100" placeholder="Например: Зарплата, Еда...">
            </div>
            <div class="form-group">
                <label for="amount">Сумма (₽):</label>
                <input type="number" id="amount" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
                <label for="description">Описание:</label>
                <textarea id="description" maxlength="255" placeholder="Краткое описание операции"></textarea>
            </div>
            <div class="form-group">
                <label for="date">Дата:</label>
                <input type="date" id="date" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-success">💾 Сохранить</button>
                <button type="button" class="btn btn-cancel" onclick="hideModal()">❌ Отмена</button>
            </div>
        </form>
    </div>
</div>

<!-- Уведомления -->
<div id="notification" class="notification"></div>
<link rel="stylesheet" href="/css/style.css">
<script src="js/app.js"></script>
</body>
</html>
