<!DOCTYPE html>
<html lang="ru">
<head>

<body>
<button class="btn btn-back" onclick="window.location.href='index.html'">

</button>

  <header>
    <h1>Доходы и Расходы за предыдущий месяц</h1>
  </header>

  <section class="info">
    <div class="box" id="incomeBox">
      <h2>Доходы</h2>
      <p id="previousIncome">0 ₽</p>

    <div class="box" id="expenseBox">
      <h2>Расходы</h2>
      <p id="previousExpense">0 ₽</p>
    </div>

    <div class="box" id="balanceBox">
      <h2>Остаток</h2>
      <p id="balance">0 ₽</p>
    </div>
  </section>

<script src="js/previous.js"></script>
