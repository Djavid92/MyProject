<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детальная статистика</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <header>
        <h1>📊 Детальная статистика</h1>
        <button class="btn btn-back" onclick="window.location.href='index.html'">
            ← На главную
        </button>
    </header>

    <!-- Фильтры -->
    <section class="filters-section">
        <div class="filters-row">
            <div class="filter-group">
                <label for="date-from">С:</label>
                <input type="date" id="date-from">
            </div>
            <div class="filter-group">
                <label for="date-to">По:</label>
                <input type="date" id="date-to">
            </div>
        </div>
        <button class="btn btn-primary" onclick="applyFilters()">Применить фильтры</button>
        <button class="btn btn-secondary" onclick="resetFilters()">Сбросить</button>
        <button class="btn btn-success" onclick="loadPreviousDetailedView()">Детальная информация за прошлый месяц</button>

    </section>

    <!-- Детальная статистика -->
    <section class="detailed-stats">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('incomes-tab')">Доходы</button>
            <button class="tab-btn" onclick="openTab('expenses-tab')">Расходы</button>
            <button class="tab-btn" onclick="openTab('charts-tab')">Графики</button>
        </div>

        <div id="incomes-tab" class="tab-content active">
            <h3>Все доходы</h3>
            <div class="table-container">
                <table id="incomes-table">
                    <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Категория</th>
                        <th>Сумма</th>
                        <th>Описание</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="expenses-tab" class="tab-content">
            <h3>Все расходы</h3>
            <div class="table-container">
                <table id="expenses-table">
                    <thead>
                    <tr>
                        <th>Дата</th>
                        <th>Категория</th>
                        <th>Сумма</th>
                        <th>Описание</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="charts-tab" class="tab-content">
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>Распределение по категориям (Доходы)</h3>
                    <canvas id="income-categories-chart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Распределение по категориям (Расходы)</h3>
                    <canvas id="expense-categories-chart"></canvas>
                </div>
            </div>
        </div>
    </section>
</div>
<link rel="stylesheet" href="/css/style.css">
<script src="js/dashboard.js"></script>
</body>
</html>
